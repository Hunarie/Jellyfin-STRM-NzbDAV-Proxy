<!DOCTYPE html>
<html lang="en">
<head>
    <title>NZBDav Proxy</title>
</head>
<body>
<div id="NzbDavProxyConfigPage"
     data-role="page"
     class="page type-interior pluginConfigurationPage"
     data-require="emby-input,emby-button,emby-checkbox">
    <div data-role="content">
        <div class="content-primary">
            <form id="NzbDavProxyConfigForm">
                <div class="inputContainer">
                    <label class="inputLabel inputLabelUnfocused" for="NzbDavBaseUrl">
                        NZBDav base URL
                    </label>
                    <input is="emby-input" type="text" id="NzbDavBaseUrl" name="NzbDavBaseUrl"
                           required />
                    <div class="fieldDescription">
                        The internal address of your NZBDav container as seen from the
                        Jellyfin container, e.g. <code>http://nzbdav:3000</code>.
                        No trailing slash.
                    </div>
                </div>

                <div class="inputContainer">
                    <label class="inputLabel inputLabelUnfocused" for="UpstreamTimeoutSeconds">
                        Upstream timeout (seconds)
                    </label>
                    <input is="emby-input" type="number" id="UpstreamTimeoutSeconds"
                           name="UpstreamTimeoutSeconds" min="5" max="600" required />
                    <div class="fieldDescription">
                        How long to wait for NZBDav to start responding before failing.
                    </div>
                </div>

                <button is="emby-button" type="submit" class="raised button-submit block">
                    <span>Save</span>
                </button>
            </form>
        </div>
    </div>

    <script type="text/javascript">
        var NzbDavProxyConfig = {
            pluginUniqueId: '19d56267-475a-47a4-b9f3-857d07630198'
        };

        document.querySelector('#NzbDavProxyConfigPage')
            .addEventListener('pageshow', function () {
                Dashboard.showLoadingMsg();
                ApiClient.getPluginConfiguration(NzbDavProxyConfig.pluginUniqueId).then(function (config) {
                    document.querySelector('#NzbDavBaseUrl').value = config.NzbDavBaseUrl || '';
                    document.querySelector('#UpstreamTimeoutSeconds').value = config.UpstreamTimeoutSeconds || 120;
                    Dashboard.hideLoadingMsg();
                });
            });

        document.querySelector('#NzbDavProxyConfigForm')
            .addEventListener('submit', function (e) {
                e.preventDefault();
                Dashboard.showLoadingMsg();
                ApiClient.getPluginConfiguration(NzbDavProxyConfig.pluginUniqueId).then(function (config) {
                    config.NzbDavBaseUrl = document.querySelector('#NzbDavBaseUrl').value;
                    config.UpstreamTimeoutSeconds = parseInt(
                        document.querySelector('#UpstreamTimeoutSeconds').value, 10);
                    ApiClient.updatePluginConfiguration(NzbDavProxyConfig.pluginUniqueId, config)
                        .then(function (result) {
                            Dashboard.processPluginConfigurationUpdateResult(result);
                        });
                });
                return false;
            });
    </script>
</div>
</body>
</html>
