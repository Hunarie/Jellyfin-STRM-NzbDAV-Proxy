framework: "net9.0"
owner: "hunarie"
overview: "Proxy internal NZBDav .strm media through Jellyfin for remote players."
description: >
  Creates a /NZBDavProxy/ API endpoint inside Jellyfin that fetches media from an
  internal NZBDav instance and streams it back to the client with byte-range
  (seek) support. Lets remote players such as Infuse play NZBDav-backed .strm
  files without exposing NZBDav to the internet, rclone, or a custom reverse proxy.
category: "General"
artifacts:
